name: Cloud Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '22'

      - name: Install pnpm
        run: npm install -g pnpm@latest

      - name: Build Frontends
        run: |
          # 关键点：先在最外层根目录统一下载并识别 catalog 依赖
          pnpm install
          
          # 然后再进入各个 web 文件夹里去执行打包
          for dir in web/*; do
            if [ -d "$dir" ] && [ -f "$dir/package.json" ]; then
              cd "$dir"
              pnpm run build
              cd ../..
            fi
          done

      - name: Commit and Push
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add web/*/dist -f
          git commit -m "Auto-build frontend dist folders with pnpm" || true
          git push
