name: Cloud Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '22'

      - name: Install pnpm
        run: npm install -g pnpm@latest

      - name: Build Frontends
        run: |
          # 1. 准确进入前端工作区根目录
          cd web
          
          # 2. 读取工作区配置，统一下载并解析 catalog 依赖
          pnpm install
          
          # 3. 递归（-r）构建所有声明在 workspace 里的子前端项目
          pnpm -r run build

      - name: Commit and Push
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          # 强制添加所有子目录下的 dist 编译结果
          git add web/*/dist -f
          git commit -m "Auto-build frontend dist folders with pnpm workspace" || true
          git push
